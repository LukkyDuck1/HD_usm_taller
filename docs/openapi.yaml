openapi: 3.1.0
info:
  title: SansaWeigh API
  description: API REST para el sistema de pesaje SansaWeigh
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Servidor local de desarrollo

paths:
  /registros:
    post:
      summary: Crear un nuevo registro de pesaje
      operationId: crearRegistro
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistroPesajeRequest'
      responses:
        '200':
          description: Registro creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistroPesaje'
        '400':
          description: Datos inválidos o restricción de negocio violada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor

    get:
      summary: Listar registros de pesaje por fecha
      operationId: listarRegistrosPorFecha
      parameters:
        - name: fecha
          in: query
          required: true
          description: Fecha de creación a filtrar (formato YYYY-MM-DD)
          schema:
            type: string
            format: date
            example: '2026-06-28'
      responses:
        '200':
          description: Lista de registros del día indicado
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RegistroPesaje'
        '400':
          description: Formato de fecha inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /registros/{id}/estado:
    put:
      summary: Cambiar el estado de un registro de pesaje
      operationId: actualizarEstado
      parameters:
        - name: id
          in: path
          required: true
          description: Identificador MongoDB del registro
          schema:
            type: string
            example: '664f1a2b3c4d5e6f7a8b9c0d'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CambioEstadoRequest'
      responses:
        '200':
          description: Estado actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistroPesaje'
        '400':
          description: Transición de estado no permitida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Registro no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    RegistroPesajeRequest:
      type: object
      required:
        - balanzaId
        - paqueteId
        - pesoKg
      properties:
        balanzaId:
          type: integer
          description: ID de la balanza utilizada
          example: 3
        paqueteId:
          type: string
          description: Identificador del paquete a pesar
          example: 'PKG-001'
        pesoKg:
          type: number
          format: double
          description: Peso del paquete en kilogramos (se convierte a Sansas internamente)
          example: 5.5

    CambioEstadoRequest:
      type: object
      required:
        - estado
      properties:
        estado:
          $ref: '#/components/schemas/EstadoPesaje'

    RegistroPesaje:
      type: object
      properties:
        id:
          type: string
          description: Identificador único MongoDB
          example: '664f1a2b3c4d5e6f7a8b9c0d'
        balanzaId:
          type: integer
          example: 3
        paqueteId:
          type: string
          example: 'PKG-001'
        pesoSansas:
          type: number
          format: double
          description: Peso convertido a unidades Sansas (1 Sansa = 1.337 kg)
          example: 4.11
        categoria:
          $ref: '#/components/schemas/CategoriaPeso'
        estado:
          $ref: '#/components/schemas/EstadoPesaje'
        createdAt:
          type: string
          format: date-time
          example: '2026-06-28T10:30:00'
        updatedAt:
          type: string
          format: date-time
          example: '2026-06-28T11:00:00'

    EstadoPesaje:
      type: string
      enum:
        - INGRESADO
        - PESADO
        - APROBADO
        - RECHAZADO
        - DESPACHADO
      description: >
        Máquina de estados del registro:
        INGRESADO → PESADO → APROBADO|RECHAZADO → DESPACHADO

    CategoriaPeso:
      type: string
      enum:
        - LIVIANO
        - MEDIANO
        - PESADO
      description: >
        Clasificación por peso en Sansas:
        LIVIANO (≤10), MEDIANO (≤50), PESADO (>50)

    Error:
      type: object
      properties:
        error:
          type: string
          description: Descripción del error
          example: 'Transicion de estado no permitida: INGRESADO -> APROBADO.'
